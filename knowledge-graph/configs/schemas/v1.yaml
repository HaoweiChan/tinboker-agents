version: "1.0"
description: "Event-centric knowledge graph schema with provenance"

entity_types:
  - Person
  - Organization
  - Product
  - Place
  - Ticker
  - Event

relation_types:
  - SUPPLIES
  - INVESTS_IN
  - PARTNERS_WITH
  - ANNOUNCED
  - LOCATED_IN
  - WORKS_FOR
  - OWNS
  - MERGED_WITH
  - ACQUIRED

evidence_schema:
  edge_type: SUPPORTED_BY
  required_fields:
    - id
    - source
    - published_at
    - snippet
    - extractor
    - confidence

event_schema:
  required_fields:
    - id
    - type
    - headline
  optional_fields:
    - when
    - where
    - props

