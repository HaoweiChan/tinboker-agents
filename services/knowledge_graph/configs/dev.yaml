api_tier: "tier_1"

batch:
  enabled: true
  size: 10

cost_optimization:
  enabled: true
  tiers:
    tier_1_file: "data/seeds/tier_1_tickers.txt"
    tier_2_file: "data/seeds/tier_2_tickers.txt"
  tier_settings:
    tier_1:
      planning: "llm"
      queries_per_ticker: 5
      docs_per_query: 5
      extraction_model: "gemini-2.5-flash"
    tier_2:
      planning: "template"
      queries_per_ticker: 2
      docs_per_query: 3
      extraction_model: "gemini-2.5-flash"
    tier_3:
      planning: "template"
      queries_per_ticker: 1
      docs_per_query: 2
      extraction_model: "gemini-1.5-flash-8b"
  caching:
    enabled: true
    ttl_hours: 24
    gcs:
      enabled: true
      bucket_name: "graphfolio-articles"
      prefix: "articles/"

connectors:
  gdelt:
    enabled: true
    timeout: 30
    retry_count: 3
    retry_delay: 1.0
  tavily:
    enabled: true
    timeout: 120
    retry_count: 3
    retry_delay: 2.0
    max_results: 5
    include_raw_content: true

visualization:
  prompt_model: "gemini-2.5-pro"
  image_model: "gemini-2.5-flash"
  language: "zh-TW"

extraction:
  llm:
    enabled: true
    default_model: "gemini-2.5-flash"
    temperature: 0.0
  pipelines:
    rules:
      enabled: true
      extractors:
        - spacy_ner
        - pattern_relations
    openie:
      enabled: true
      extractors:
        - simple_openie
    llm:
      enabled: true
      extractors:
        - structured_llm

graph_store:
  type: neo4j
  neo4j:
    uri: "bolt://localhost:7687"
    user: "neo4j"
    password: "password"
    database: "neo4j"
  kuzu:
    path: "./kuzu-data"
  memgraph:
    uri: "bolt://localhost:7687"
    user: ""
    password: ""

schema:
  version: "1.0"
  path: "configs/schemas/v1.yaml"

normalization:
  language_filter: "en"
  dedupe_enabled: true
  url_canonicalization: true
  timezone_normalization: true

